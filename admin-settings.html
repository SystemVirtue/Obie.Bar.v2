<!-- Admin Settings Panel -->
<div id="admin-settings" class="admin-panel">
    <h2>Admin Settings</h2>
    
    <div class="settings-section">
        <h3>Volume Control</h3>
        <div class="range-container">
            <input type="range" id="volume-control" min="0" max="100" value="100">
            <span id="volume-value">100%</span>
        </div>
    </div>

    <div class="settings-section">
        <h3>Queue Settings</h3>
        <div class="input-group">
            <label>
                Maximum Queue Length:
                <input type="number" id="queue-limit" min="1" max="100" value="10">
            </label>
            <label>
                Queue Timeout (minutes):
                <input type="number" id="queue-timeout" min="1" max="120" value="30">
            </label>
        </div>
    </div>

    <div class="settings-section">
        <h3>Playback Settings</h3>
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="autoplay-toggle" checked>
                Autoplay Videos
            </label>
            <label>
                <input type="checkbox" id="shuffle-toggle">
                Shuffle Queue
            </label>
            <label>
                <input type="checkbox" id="repeat-toggle">
                Repeat Playlist
            </label>
        </div>
    </div>

    <div class="settings-section">
        <h3>Video Quality</h3>
        <div class="quality-options">
            <label>
                <input type="radio" name="quality" value="auto" checked>
                Auto
            </label>
            <label>
                <input type="radio" name="quality" value="1080p">
                1080p
            </label>
            <label>
                <input type="radio" name="quality" value="720p">
                720p
            </label>
            <label>
                <input type="radio" name="quality" value="480p">
                480p
            </label>
        </div>
    </div>

    <div class="settings-section">
        <h3>Custom URL</h3>
        <div id="custom-url-display" class="url-display">
            Your custom URL will appear here after registration
        </div>
    </div>

    <div class="button-group">
        <button id="save-settings" class="primary-button">Save Settings</button>
        <button id="reset-settings" class="secondary-button">Reset to Defaults</button>
    </div>
</div>
