<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obie Bar Jukebox</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="app">
        <!-- Your existing UI elements here -->
        <div id="player-container">
            <iframe id="player-iframe" src="https://player2.obie.bar" style="display: none; width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>
    <script src="../script.js"></script>
    <script>
        // Add event listeners for player control
        document.addEventListener('DOMContentLoaded', () => {
            // Add your existing initialization code here
            
            // Example of how to show/hide the player
            window.electronAPI.showPlayer();
            
            // Handle player visibility
            window.addEventListener('message', (event) => {
                if (event.data.type === 'player-state') {
                    if (event.data.state === 'playing') {
                        window.electronAPI.showPlayer();
                    } else if (event.data.state === 'stopped') {
                        window.electronAPI.hidePlayer();
                    }
                }
            });
        });
    </script>
</body>
</html>
